
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua walkArray 递归演示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: ui-monospace, Consolas, monospace;
  background: #0f172a;
  color: #e2e8f0;
  padding: 20px;
}

.demo-layout {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
}

.tree {
  background: #020617;
  padding: 20px;
  border-radius: 10px;
  min-width: 280px;
}

.right-panel {
  flex: 1;
  min-width: 300px;
}

.explain {
  background: #020617;
  padding: 16px;
  border-radius: 10px;
  min-height: 220px;
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 14px;
}

.tree ul {
  list-style: none;
  padding-left: 20px;
  position: relative;
}

.tree ul::before {
  content: "";
  border-left: 1px solid #334155;
  position: absolute;
  top: 0; bottom: 0; left: 0;
}

.tree li {
  margin: 5px 0;
  padding-left: 16px;
  position: relative;
}

.tree li::before {
  content: "";
  border-top: 1px solid #334155;
  position: absolute;
  top: 12px; left: 0; width: 12px;
}

.node {
  padding: 2px 8px;
  border-radius: 6px;
  transition: all 0.3s;
  display: inline-block;
}

.value { color: #38bdf8; }
.active { background: #22c55e; color: #fff; }
.visited { opacity: 0.35; }
.on-path { outline: 2px solid #facc15; outline-offset: 2px; }

.output-title {
  color: #94a3b8;
  font-size: 13px;
  margin: 12px 0 4px;
}

.output-box {
  background: #020617;
  padding: 12px;
  border-radius: 10px;
  min-height: 50px;
  font-size: 13px;
  color: #a5f3fc;
  white-space: pre-wrap;
  line-height: 1.5;
}

.controls {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

button {
  padding: 7px 16px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: #fff;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
}

button:hover { background: #1d4ed8; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.counter {
  color: #94a3b8;
  font-size: 13px;
  margin-left: 4px;
}

.legend {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 12px;
}

.legend span { margin-right: 14px; }
</style>
</head>
<body>

<div class="legend">
  <span>🟢 当前节点</span>
  <span>🟡 路径节点</span>
  <span>⬜ 已访问</span>
</div>

<div class="demo-layout">
  <div class="tree">
    <ul>
      <li><span class="node" id="n0">cube</span>
        <ul>
          <li><span class="node" id="n1">[1]</span>
            <ul>
              <li><span class="node" id="n2">[1]</span>
                <ul>
                  <li><span class="node value" id="n3">1</span></li>
                  <li><span class="node value" id="n4">2</span></li>
                  <li><span class="node value" id="n5">3</span></li>
                </ul>
              </li>
              <li><span class="node" id="n6">[2]</span>
                <ul>
                  <li><span class="node value" id="n7">4</span></li>
                  <li><span class="node value" id="n8">5</span></li>
                  <li><span class="node value" id="n9">6</span></li>
                </ul>
              </li>
            </ul>
          </li>
          <li><span class="node" id="n10">[2]</span>
            <ul>
              <li><span class="node" id="n11">[1]</span>
                <ul>
                  <li><span class="node value" id="n12">7</span></li>
                  <li><span class="node value" id="n13">8</span></li>
                  <li><span class="node value" id="n14">9</span></li>
                </ul>
              </li>
              <li><span class="node" id="n15">[2]</span>
                <ul>
                  <li><span class="node value" id="n16">10</span></li>
                  <li><span class="node value" id="n17">11</span></li>
                  <li><span class="node value" id="n18">12</span></li>
                </ul>
              </li>
            </ul>
          </li>
        </ul>
      </li>
    </ul>
  </div>

  <div class="right-panel">
    <div class="explain" id="explain">点击「下一步」开始演示</div>
    <div class="output-title">📋 callback 输出：</div>
    <div class="output-box" id="output"></div>
  </div>
</div>

<div class="controls">
  <button onclick="luaNext()" id="btnNext">下一步</button>
  <button onclick="luaPrev()" id="btnPrev" disabled>上一步</button>
  <button onclick="luaReset()">重置</button>
  <button onclick="luaAuto()" id="btnAuto">▶ 自动</button>
  <span class="counter" id="counter"></span>
</div>

<script>
(function(){

var steps = [
  {
    nd:[0], pa:[0], vi:[], out:"",
    tx:"🔵 开始 walkArray(cube, callback)\n\npath = {}\ncube 是 table → pairs 遍历"
  },
  {
    nd:[1], pa:[0,1], vi:[], out:"",
    tx:"📍 第一层 k=1\npath[#path+1] = 1\npath = {1}\n\ncube[1] 是 table\n→ 递归 walkArray(cube[1])"
  },
  {
    nd:[2], pa:[0,1,2], vi:[], out:"",
    tx:"📍 第二层 k=1\npath = {1,1}\n\ncube[1][1] 是 table\n→ 递归 walkArray(cube[1][1])"
  },
  {
    nd:[3], pa:[0,1,2,3], vi:[],
    out:"[1][1][1] = 1",
    tx:"📍 第三层 k=1\npath = {1,1,1}\ncube[1][1][1] = 1 ← 不是table\n\n✅ callback(1, {1,1,1})\n\npath[#path]=nil → path={1,1}"
  },
  {
    nd:[4], pa:[0,1,2,4], vi:[3],
    out:"[1][1][1] = 1\n[1][1][2] = 2",
    tx:"📍 第三层 k=2\npath = {1,1,2}\ncube[1][1][2] = 2\n\n✅ callback(2, {1,1,2})\n\npath[#path]=nil → path={1,1}"
  },
  {
    nd:[5], pa:[0,1,2,5], vi:[3,4],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3",
    tx:"📍 第三层 k=3\npath = {1,1,3}\ncube[1][1][3] = 3\n\n✅ callback(3, {1,1,3})\n\n🔙 第三层循环结束\npath[#path]=nil → {1,1}\npath[#path]=nil → {1}\n回到第二层"
  },
  {
    nd:[6], pa:[0,1,6], vi:[3,4,5],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3",
    tx:"📍 第二层继续 k=2\npath = {1,2}\n\ncube[1][2] 是 table\n→ 递归进入"
  },
  {
    nd:[7], pa:[0,1,6,7], vi:[3,4,5],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4",
    tx:"📍 第三层 k=1\npath = {1,2,1}\ncube[1][2][1] = 4\n\n✅ callback(4, {1,2,1})"
  },
  {
    nd:[8], pa:[0,1,6,8], vi:[3,4,5,7],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5",
    tx:"📍 k=2  path = {1,2,2}\n\n✅ callback(5, {1,2,2})"
  },
  {
    nd:[9], pa:[0,1,6,9], vi:[3,4,5,7,8],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6",
    tx:"📍 k=3  path = {1,2,3}\ncube[1][2][3] = 6\n\n✅ callback(6, {1,2,3})\n\n🔙 三层→二层→一层全部回退\npath = {}\n回到第一层"
  },
  {
    nd:[10], pa:[0,10], vi:[3,4,5,7,8,9],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6",
    tx:"📍 第一层继续 k=2\npath = {2}\n\ncube[2] 是 table\n→ 递归 walkArray(cube[2])"
  },
  {
    nd:[11], pa:[0,10,11], vi:[3,4,5,7,8,9],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6",
    tx:"📍 第二层 k=1\npath = {2,1}\n\ncube[2][1] 是 table\n→ 递归进入"
  },
  {
    nd:[12], pa:[0,10,11,12], vi:[3,4,5,7,8,9],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6\n[2][1][1] = 7",
    tx:"📍 第三层 k=1\npath = {2,1,1}\ncube[2][1][1] = 7\n\n✅ callback(7, {2,1,1})"
  },
  {
    nd:[13], pa:[0,10,11,13], vi:[3,4,5,7,8,9,12],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6\n[2][1][1] = 7\n[2][1][2] = 8",
    tx:"📍 k=2  path = {2,1,2}\n\n✅ callback(8, {2,1,2})"
  },
  {
    nd:[14], pa:[0,10,11,14], vi:[3,4,5,7,8,9,12,13],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6\n[2][1][1] = 7\n[2][1][2] = 8\n[2][1][3] = 9",
    tx:"📍 k=3  path = {2,1,3}\ncube[2][1][3] = 9\n\n✅ callback(9, {2,1,3})\n\n🔙 第三层结束\npath → {2}\n回到第二层"
  },
  {
    nd:[15], pa:[0,10,15], vi:[3,4,5,7,8,9,12,13,14],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6\n[2][1][1] = 7\n[2][1][2] = 8\n[2][1][3] = 9",
    tx:"📍 第二层继续 k=2\npath = {2,2}\n\ncube[2][2] 是 table\n→ 递归进入"
  },
  {
    nd:[16], pa:[0,10,15,16], vi:[3,4,5,7,8,9,12,13,14],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6\n[2][1][1] = 7\n[2][1][2] = 8\n[2][1][3] = 9\n[2][2][1] = 10",
    tx:"📍 第三层 k=1\npath = {2,2,1}\ncube[2][2][1] = 10\n\n✅ callback(10, {2,2,1})"
  },
  {
    nd:[17], pa:[0,10,15,17], vi:[3,4,5,7,8,9,12,13,14,16],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6\n[2][1][1] = 7\n[2][1][2] = 8\n[2][1][3] = 9\n[2][2][1] = 10\n[2][2][2] = 11",
    tx:"📍 k=2  path = {2,2,2}\n\n✅ callback(11, {2,2,2})"
  },
  {
    nd:[18], pa:[0,10,15,18], vi:[3,4,5,7,8,9,12,13,14,16,17],
    out:"[1][1][1] = 1\n[1][1][2] = 2\n[1][1][3] = 3\n[1][2][1] = 4\n[1][2][2] = 5\n[1][2][3] = 6\n[2][1][1] = 7\n[2][1][2] = 8\n[2][1][3] = 9\n[2][2][1] = 10\n[2][2][2] = 11\n[2][2][3] = 12",
    tx:"📍 k=3  path = {2,2,3}\ncube[2][2][3] = 12\n\n✅ callback(12, {2,2,3})\n\n🔙 全部回退 path={}\n\n🎉 遍历完成！"
  }
];

var i = 0, timer = null;

function cls(){
  var a = document.querySelectorAll(".active,.on-path,.visited");
  for(var j=0;j<a.length;j++) a[j].classList.remove("active","on-path","visited");
}

function show(s){
  cls();
  var j,el;
  for(j=0;j<s.vi.length;j++){el=document.getElementById("n"+s.vi[j]);if(el)el.classList.add("visited");}
  for(j=0;j<s.pa.length;j++){el=document.getElementById("n"+s.pa[j]);if(el)el.classList.add("on-path");}
  for(j=0;j<s.nd.length;j++){el=document.getElementById("n"+s.nd[j]);if(el){el.classList.remove("on-path");el.classList.add("active");}}
  document.getElementById("explain").innerText = s.tx;
  document.getElementById("output").innerText = s.out;
  document.getElementById("counter").innerText = (i+1)+"/"+steps.length;
  document.getElementById("btnPrev").disabled = (i===0);
}

window.luaNext = function(){if(i>=steps.length)return;show(steps[i]);i++;};
window.luaPrev = function(){if(i<=1)return;i-=2;show(steps[i]);i++;};
window.luaReset = function(){
  window.luaStop();i=0;cls();
  document.getElementById("explain").innerText="点击「下一步」开始演示";
  document.getElementById("output").innerText="";
  document.getElementById("counter").innerText="";
  document.getElementById("btnPrev").disabled=true;
  document.getElementById("btnAuto").innerText="▶ 自动";
};
window.luaStop = function(){clearInterval(timer);timer=null;document.getElementById("btnAuto").innerText="▶ 自动";};
window.luaAuto = function(){
  if(timer){window.luaStop();return;}
  document.getElementById("btnAuto").innerText="⏸ 暂停";
  timer=setInterval(function(){if(i>=steps.length){window.luaStop();return;}window.luaNext();},1500);
};

})();
</script>
</body>
</html>
